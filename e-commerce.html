<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prajwal Tech Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f4f4;
}

/* HEADER */

header{
background:#111;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
}

.logo{
font-size:22px;
font-weight:bold;
}

header button{
background:#00adb5;
border:none;
color:white;
padding:8px 15px;
cursor:pointer;
border-radius:4px;
}

/* SEARCH */

.search{
text-align:center;
margin:20px;
}

.search input{
padding:10px;
width:280px;
border:1px solid #ccc;
}

/* CATEGORY */

.categories{
text-align:center;
margin-bottom:20px;
}

.categories button{
margin:5px;
padding:8px 15px;
border:none;
background:#222;
color:white;
cursor:pointer;
border-radius:4px;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.product{
background:white;
padding:15px;
border-radius:8px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:160px;
object-fit:cover;
border-radius:5px;
}

.product h3{
margin:10px 0;
}

.product button{
margin-top:10px;
padding:8px;
border:none;
background:#00adb5;
color:white;
cursor:pointer;
width:100%;
border-radius:4px;
}

/* CART */

.cartPanel{
position:fixed;
right:0;
top:0;
width:330px;
height:100%;
background:white;
padding:20px;
box-shadow:-3px 0 10px rgba(0,0,0,0.2);
transform:translateX(100%);
transition:0.3s;
overflow:auto;
z-index:1000;
}

.cartPanel.active{
transform:translateX(0);
}

.closeCart{
background:red;
color:white;
border:none;
padding:6px 12px;
cursor:pointer;
margin-bottom:10px;
}

.cartItem{
display:flex;
justify-content:space-between;
margin:12px 0;
font-size:14px;
}

.qtyBtn{
padding:2px 8px;
margin:0 3px;
}

.total{
margin-top:20px;
font-weight:bold;
}

.checkout{
margin-top:10px;
width:100%;
padding:10px;
border:none;
background:#111;
color:white;
cursor:pointer;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
}

.overlay.active{
display:block;
}

</style>
</head>

<body>

<header>

<div class="logo">Prajwal Tech Store</div>

<button onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>

</header>

<div class="search">
<input type="text" id="search" placeholder="Search product..." onkeyup="searchProducts()">
</div>

<div class="categories">
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('laptop')">Laptops</button>
<button onclick="filterCategory('phone')">Phones</button>
<button onclick="filterCategory('accessory')">Accessories</button>
</div>

<section class="products" id="productContainer"></section>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="cartPanel" id="cartPanel">

<button class="closeCart" onclick="toggleCart()">Close</button>

<h2>Your Cart</h2>

<div id="cartItems"></div>

<p class="total">Total: ₹<span id="totalPrice">0</span></p>

<h3>Customer Details</h3>

<input type="text" id="customerName" placeholder="Enter your name" style="width:100%;padding:8px;margin-top:8px">

<input type="email" id="customerEmail" placeholder="Enter your email" style="width:100%;padding:8px;margin-top:8px">

<button class="checkout" onclick="checkout()">Checkout</button>

</div>

function sendOrderToSheet(name,email,product,price,qty){

let total = price * qty;

return fetch(scriptURL, {

method: "POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
name: name,
email: email,
product: product,
quantity: qty,
price: price,
total: total
})

})

.then(res => res.text())
.then(data => console.log("Saved to sheet:", data))
.catch(err => console.log("Error sending data", err))

}

let cart=JSON.parse(localStorage.getItem("cart")) || []

/* DISPLAY PRODUCTS */

function showProducts(list){

let html=""

list.forEach(p=>{

html+=`

<div class="product">

<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>

<button onclick="addToCart(${p.id})">Add to Cart</button>

</div>

`

})

document.getElementById("productContainer").innerHTML=html

}

showProducts(products)

/* SEARCH */

function searchProducts(){

let value=document.getElementById("search").value.toLowerCase()

let filtered=products.filter(p=>p.name.toLowerCase().includes(value))

showProducts(filtered)

}

/* CATEGORY */

function filterCategory(cat){

if(cat==="all"){
showProducts(products)
}else{
showProducts(products.filter(p=>p.category===cat))
}

}

/* ADD CART */

function addToCart(id){

let item=cart.find(p=>p.id===id)

if(item){
item.qty++
}else{
let product=products.find(p=>p.id===id)
cart.push({...product,qty:1})
}

saveCart()

}

/* SAVE */

function saveCart(){

localStorage.setItem("cart",JSON.stringify(cart))
updateCart()

}

/* UPDATE CART */

function updateCart(){

let html=""
let total=0

cart.forEach((item,index)=>{

total+=item.price*item.qty

html+=`

<div class="cartItem">

${item.name}

<div>

<button class="qtyBtn" onclick="changeQty(${index},-1)">-</button>

${item.qty}

<button class="qtyBtn" onclick="changeQty(${index},1)">+</button>

<button onclick="removeItem(${index})">X</button>

</div>

</div>

`

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("totalPrice").innerText=total
document.getElementById("cartCount").innerText=cart.length

}

updateCart()

function changeQty(index,amount){

cart[index].qty+=amount

if(cart[index].qty<=0){
cart.splice(index,1)
}

saveCart()

}

function removeItem(index){

cart.splice(index,1)
saveCart()

}

/* CART PANEL */

function toggleCart(){

document.getElementById("cartPanel").classList.toggle("active")
document.getElementById("overlay").classList.toggle("active")

}

/* CHECKOUT */

async function checkout(){

let name=document.getElementById("customerName").value
let email=document.getElementById("customerEmail").value

if(name=="" || email==""){
alert("Please enter your name and email")
return
}

if(cart.length===0){
alert("Cart is empty")
return
}

try{

for(const item of cart){

await sendOrderToSheet(name,email,item.name,item.price,item.qty)

}

alert("Order placed successfully!")

cart=[]
saveCart()

document.getElementById("customerName").value=""
document.getElementById("customerEmail").value=""

}
catch(error){

alert("Error sending order")

}

}

cart.forEach(item => {

function sendOrderToSheet(name,email,product,price,qty){

let total = price * qty;

return fetch(scriptURL,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name:name,
email:email,
product:product,
quantity:qty,
price:price,
total:total
})

})
.then(res=>res.text())
.then(data=>console.log("Saved:",data))
.catch(err=>console.log("Error:",err))

}

})

alert("Order placed successfully!")

cart=[]

saveCart()


</script>
